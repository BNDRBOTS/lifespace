<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Learning World</title>
    <style>
        :root {
            --color-light-bg: #fdfdfd;
            --color-light-text: #1a1a1c;
            --color-dark-bg: #0a0a0c;
            --color-dark-text: #eaeaea;
            
            --current-bg: var(--color-light-bg);
            --current-text: var(--color-light-text);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            background-color: var(--current-bg);
            color: var(--current-text);
            transition: background-color 4s ease-in-out, color 4s ease-in-out;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #canvas-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            pointer-events: none;
        }

        .text-panel {
            grid-column: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: clamp(2rem, 8vw, 6rem);
            pointer-events: auto;
        }

        h1 {
            font-family: 'Newsreader', 'Georgia', serif;
            font-size: clamp(2.5rem, 4vw, 4rem);
            font-weight: 300;
            line-height: 1.1;
            margin: 0 0 1.5rem 0;
            letter-spacing: -0.01em;
            transition: opacity 2s ease-in-out;
        }

        p {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: clamp(0.95rem, 1.2vw, 1.1rem);
            font-weight: 300;
            line-height: 1.7;
            margin: 0;
            opacity: 0.6;
            max-width: 360px;
            letter-spacing: 0.01em;
            transition: opacity 2s ease-in-out;
        }

        .status-ring {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--current-text);
            margin-bottom: 2.5rem;
            opacity: 0.4;
            transition: transform 2.5s cubic-bezier(0.2, 0.8, 0.2, 1), background-color 2.5s ease;
        }

        .noise-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            opacity: 0.03;
            mix-blend-mode: multiply;
        }

        @media (max-width: 768px) {
            .ui-layer {
                grid-template-columns: 1fr;
                align-items: end;
            }
            .text-panel {
                grid-column: 1;
                padding: 2rem 2rem 15dvh 2rem;
            }
            p {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <svg class="noise-overlay" xmlns="http://www.w3.org/2000/svg">
        <filter id="noiseFilter">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/>
        </filter>
        <rect width="100%" height="100%" filter="url(#noiseFilter)"/>
    </svg>

    <canvas id="canvas-layer"></canvas>

    <div class="ui-layer">
        <div></div>
        <div class="text-panel">
            <div class="status-ring" id="indicator"></div>
            <h1 id="headline">I am here.</h1>
            <p id="subtext">Follow the light. The shapes part like the wind.</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas-layer');
        const ctx = canvas.getContext('2d', { alpha: true });
        
        const headline = document.getElementById('headline');
        const subtext = document.getElementById('subtext');
        const indicator = document.getElementById('indicator');
        const root = document.documentElement;

        let width = window.innerWidth;
        let height = window.innerHeight;
        
        let tension = 0.0; 
        let targetTension = 0.0;
        let mouseX = width / 2;
        let mouseY = height / 2;
        let lastMouseX = mouseX;
        let lastMouseY = mouseY;
        let isIdle = false;
        let idleTimer = 0;

        let smoothVelX = 0;
        let smoothVelY = 0;
        let guideAngle = 0;
        let arrowVisualOpacity = 1.0;
        let currentTextState = "moving";
        
        let isTouch = false;
        let tiltX = 0;
        let tiltY = 0;

        const count = 500;
        const pos = new Float32Array(count * 2);
        const mom = new Float32Array(count * 2);
        const base = new Float32Array(count * 2);

        function init() {
            canvas.width = width * window.devicePixelRatio;
            canvas.height = height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

            for (let i = 0; i < count; i++) {
                const rx = Math.random() * width;
                const ry = Math.random() * height;
                base[i * 2] = rx;
                base[i * 2 + 1] = ry;
                pos[i * 2] = rx;
                pos[i * 2 + 1] = ry;
                mom[i * 2] = 0;
                mom[i * 2 + 1] = 0;
            }
        }

        window.addEventListener('mousemove', (e) => {
            isTouch = false;
            mouseX = e.clientX;
            mouseY = e.clientY;
            isIdle = false;
            idleTimer = 0;
        });

        window.addEventListener('click', async () => {
            targetTension = Math.min(1.0, targetTension + 0.3);
            isIdle = false;
            idleTimer = 0;
            
            // Request tilt permission on iOS 13+ if needed
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        window.addEventListener('deviceorientation', handleTilt);
                    }
                } catch (err) {
                    // Fail silently, touch works fine
                }
            }
        });

        window.addEventListener('touchstart', (e) => {
            isTouch = true;
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
            lastMouseX = mouseX;
            lastMouseY = mouseY;
            isIdle = false;
            idleTimer = 0;
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
            isIdle = false;
            idleTimer = 0;
        }, { passive: true });

        // Native tilt for mobile feeling alive without touching
        function handleTilt(e) {
            if (!e.beta || !e.gamma) return;
            // Gamma is left/right (-90 to 90), Beta is front/back (-180 to 180)
            tiltX = Math.sin(e.gamma * Math.PI / 180) * 0.4;
            tiltY = Math.sin(e.beta * Math.PI / 180) * 0.4;
            isIdle = false;
        }
        window.addEventListener('deviceorientation', handleTilt);

        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * window.devicePixelRatio;
            canvas.height = height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        });

        function updateBehavior() {
            const dx = mouseX - lastMouseX;
            const dy = mouseY - lastMouseY;
            const speed = Math.sqrt(dx * dx + dy * dy);

            smoothVelX += (dx - smoothVelX) * 0.1;
            smoothVelY += (dy - smoothVelY) * 0.1;
            
            if (Math.abs(smoothVelX) > 0.1 || Math.abs(smoothVelY) > 0.1) {
                guideAngle = Math.atan2(smoothVelY, smoothVelX);
            }

            if (speed > 12) {
                targetTension = Math.min(1.0, targetTension + 0.04);
            }

            idleTimer++;
            if (idleTimer > 80) {
                isIdle = true;
                targetTension = Math.max(0.0, targetTension - 0.008);
            } else if (speed < 2) {
                targetTension = Math.max(0.0, targetTension - 0.005);
            }

            tension += (targetTension - tension) * 0.015;

            let targetOp = tension > 0.35 ? 0.0 : 1.0;
            arrowVisualOpacity += (targetOp - arrowVisualOpacity) * 0.008;

            lastMouseX = mouseX;
            lastMouseY = mouseY;
        }

        function setPatientText(head, sub, stateKey) {
            if (currentTextState !== stateKey) {
                currentTextState = stateKey;
                headline.style.opacity = '0';
                subtext.style.opacity = '0';
                
                setTimeout(() => {
                    if (currentTextState === stateKey) {
                        headline.innerText = head;
                        subtext.innerText = sub;
                        headline.style.opacity = '1';
                        subtext.style.opacity = '0.6';
                    }
                }, 2000); 
            }
        }

        function updateUI() {
            if (tension > 0.6) {
                setPatientText("The glow fades.", "We move too fast. The dark waits for calm.", "fast");
                root.style.setProperty('--current-bg', 'var(--color-dark-bg)');
                root.style.setProperty('--current-text', 'var(--color-dark-text)');
                indicator.style.transform = "scale(2.5)";
            } else if (tension < 0.2 && isIdle) {
                setPatientText("The path clears.", "The space steps aside. We can move through.", "idle");
                root.style.setProperty('--current-bg', 'var(--color-light-bg)');
                root.style.setProperty('--current-text', 'var(--color-light-text)');
                indicator.style.transform = "scale(0.5)";
            } else if (tension > 0.25 && tension < 0.55) {
                setPatientText("I am here.", "Follow the light. The shapes part like the wind.", "moving");
                root.style.setProperty('--current-bg', 'var(--color-light-bg)');
                root.style.setProperty('--current-text', 'var(--color-light-text)');
                indicator.style.transform = "scale(1)";
            }
        }

        function render() {
            updateBehavior();
            updateUI();

            ctx.clearRect(0, 0, width, height);

            const influenceRadius = 180 + (tension * 250);
            const repelForce = tension * 0.4;
            const returnForce = 0.005 + ((1.0 - tension) * 0.015);
            const friction = 0.96 - (tension * 0.08);

            const r = Math.floor(26 + (tension * 214));
            const g = Math.floor(26 + (tension * 214));
            const b = Math.floor(28 + (tension * 214));
            ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${0.85 - (tension * 0.45)})`;
            
            // Guide leads the cursor naturally
            const guideX = mouseX + Math.cos(guideAngle) * 35;
            const guideY = mouseY + Math.sin(guideAngle) * 35;

            ctx.beginPath();

            for (let i = 0; i < count; i++) {
                const px = pos[i * 2];
                const py = pos[i * 2 + 1];
                const bx = base[i * 2];
                const by = base[i * 2 + 1];

                const dx = px - mouseX;
                const dy = py - mouseY;
                const distSq = dx * dx + dy * dy;
                const dist = Math.sqrt(distSq);

                const gdx = px - guideX;
                const gdy = py - guideY;
                const gDistSq = gdx * gdx + gdy * gdy;

                // Frame the physical finger: Push everything out of a 50px core radius completely
                if (isTouch && dist < 50) {
                    const clearForce = (50 - dist) / 50;
                    mom[i * 2] += (dx / dist) * clearForce * 12;
                    mom[i * 2 + 1] += (dy / dist) * clearForce * 12;
                } 
                else if (tension <= 0.35 && gDistSq < influenceRadius * influenceRadius) {
                    const gDist = Math.sqrt(gDistSq);
                    const force = Math.pow((influenceRadius - gDist) / influenceRadius, 2);
                    const gentleForce = Math.pow(force, 3);
                    mom[i * 2] += (gdx / gDist) * gentleForce * 1.5;
                    mom[i * 2 + 1] += (gdy / gDist) * gentleForce * 1.5;
                } 
                else if (tension > 0.35 && distSq < influenceRadius * influenceRadius) {
                    const force = Math.pow((influenceRadius - dist) / influenceRadius, 2);
                    mom[i * 2] += (dx / dist) * force * repelForce * 8;
                    mom[i * 2 + 1] += (dy / dist) * force * repelForce * 8;
                }

                // Add phone tilt gravity
                mom[i * 2] += tiltX;
                mom[i * 2 + 1] += tiltY;

                mom[i * 2] += (bx - px) * returnForce;
                mom[i * 2 + 1] += (by - py) * returnForce;

                mom[i * 2] *= friction;
                mom[i * 2 + 1] *= friction;

                pos[i * 2] += mom[i * 2];
                pos[i * 2 + 1] += mom[i * 2 + 1];

                if (tension > 0.65) {
                    ctx.rect(pos[i * 2], pos[i * 2 + 1], 1.5, 1.5);
                } else {
                    ctx.moveTo(pos[i * 2], pos[i * 2 + 1]);
                    ctx.arc(pos[i * 2], pos[i * 2 + 1], 1.8, 0, Math.PI * 2);
                }
            }
            ctx.fill();

            if (arrowVisualOpacity > 0.01) {
                ctx.save();
                ctx.translate(guideX, guideY);
                ctx.rotate(guideAngle);
                
                const pulse = 0.8 + 0.2 * Math.sin(Date.now() / 600);
                const finalOp = arrowVisualOpacity * pulse;
                
                ctx.shadowBlur = 12;
                ctx.shadowColor = `rgba(10, 255, 100, ${finalOp})`;
                ctx.strokeStyle = `rgba(10, 255, 100, ${finalOp})`;
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                ctx.beginPath();
                ctx.moveTo(-10, -6);
                ctx.lineTo(3, 0); 
                ctx.lineTo(-10, 6);
                ctx.stroke();
                
                ctx.restore();
            }

            requestAnimationFrame(render);
        }

        init();
        render();
        targetTension = 0.4;
    </script>
</body>
</html>
